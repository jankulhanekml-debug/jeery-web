<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --bg-color: #030303;
            --text-main: #ffffff;
            --text-muted: #666666;
            --accent-green: #008026;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0.025;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        header {
            padding: 50px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.4em;
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0.9;
            cursor: pointer;
            pointer-events: auto;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn-ui {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto;
        }

        .btn-ui:hover {
            background: var(--text-main);
            color: var(--bg-color);
            border-color: var(--text-main);
        }

        .audio-waves {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            width: 16px;
            height: 10px;
        }

        .wave-bar {
            width: 1.5px;
            height: 2px;
            background: currentColor;
        }

        .audio-control.playing .wave-bar {
            animation: soundWave 1s infinite ease-in-out;
        }
        .audio-control.playing .wave-bar:nth-child(2) { animation-delay: 0.15s; }
        .audio-control.playing .wave-bar:nth-child(3) { animation-delay: 0.3s; }

        .content-view {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr;
            align-items: center;
            justify-items: center;
            padding: 20px;
            position: relative;
            width: 100%;
        }

        .section {
            grid-area: 1 / 1 / 2 / 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 800px;
            opacity: 0;
            transform: translateY(30px);
            pointer-events: none;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .section.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .hero-title {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(4rem, 14vw, 10rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 0.85;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 40%, #777777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            user-select: none;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
            margin-bottom: 40px;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 50px 60px;
            border-radius: 24px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 550px;
        }

        .contact-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            margin-bottom: 35px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 50%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .contact-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
            text-align: left;
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .contact-label {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .contact-value {
            font-size: 1.05rem;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .contact-value a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .contact-value a:hover {
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(255,255,255,0.4);
        }

        .soundcloud-btn {
            pointer-events: auto;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 18px 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            border-radius: 50px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .soundcloud-btn:hover {
            background: var(--text-main);
            color: var(--bg-color);
            border-color: var(--text-main);
            transform: translateY(-3px);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8);
        }

        .soundcloud-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        footer {
            padding: 50px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: var(--text-muted);
        }

        @keyframes soundWave {
            0% { height: 2px; }
            50% { height: 10px; }
            100% { height: 2px; }
        }

        @media (max-width: 768px) {
            header { padding: 30px 24px; }
            footer { padding: 30px 24px; flex-direction: column; gap: 16px; text-align: center; }
            .contact-card { padding: 35px 30px; }
        }
    </style>
</head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- POZADÍ SHADER ---
        const bgVertexShader = `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
        `;
        const bgFragmentShader = `
            varying vec2 vUv; uniform float uTime;
            void main() {
                vec2 uv = vUv * 2.0 - 1.0; float dist = length(uv);
                float pulse = sin(uTime * 0.25) * 0.03 + 0.97;
                vec3 spaceCore = vec3(0.025, 0.065, 0.045) * pulse; 
                vec3 spaceVoid = vec3(0.004, 0.004, 0.005);       
                float glow = smoothstep(1.6, 0.1, dist);
                gl_FragColor = vec4(mix(spaceVoid, spaceCore, glow), 1.0);
            }
        `;

        // --- MASTER OBJECT SHADERS ---
        const vertexShader = `
            uniform float uTime; varying vec3 vNormal; varying vec3 vViewPosition;
            void main() {
                vec3 pos = position;
                float wave = sin(pos.x * 2.5 + uTime * 0.7) * cos(pos.y * 2.5 + uTime * 0.6) * sin(pos.z * 2.5 + uTime * 0.5);
                pos += normal * wave * 0.14;
                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                vViewPosition = -mvPosition.xyz; vNormal = normalMatrix * normal;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        const fragmentShader = `
            varying vec3 vNormal; varying vec3 vViewPosition; uniform int uMaterialType;
            void main() {
                vec3 normal = normalize(vNormal); vec3 viewDir = normalize(vViewPosition);
                vec3 baseBlack = vec3(0.002, 0.002, 0.003); 
                
                vec3 lightDir1 = normalize(vec3(6.0, 10.0, 5.0));
                vec3 lightDir2 = normalize(vec3(-6.0, -5.0, 4.0));
                vec3 lightDir3 = normalize(vec3(0.0, 0.0, 1.0));
                
                vec3 reflectColor = (uMaterialType == 1) ? vec3(0.01, 0.45, 0.12) : vec3(1.0, 1.0, 1.0);
                
                float fresnel = pow(1.0 - max(dot(normal, viewDir), 0.0), 8.5);
                vec3 edgeReflection = reflectColor * fresnel * 0.85;
                
                vec3 halfDir1 = normalize(lightDir1 + viewDir);
                vec3 halfDir2 = normalize(lightDir2 + viewDir);
                
                float spec1 = pow(max(dot(normal, halfDir1), 0.0), 90.0);
                float spec2 = pow(max(dot(normal, halfDir2), 0.0), 64.0);
                float spec3 = pow(max(dot(normal, lightDir3), 0.0), 32.0);
                
                gl_FragColor = vec4(baseBlack + edgeReflection + reflectColor * (spec1 * 0.95 + spec2 * 0.30 + spec3 * 0.08), 1.0);
            }
        `;

        class WebGLScene {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.floatingObjects = [];
                this.mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
                this.currentView = 'home';
                
                this.init();
                this.createBackgroundSpace();
                this.createGeometries();
                this.createFloatingSystem();
                this.addEvents();
                this.animate();
            }

            init() {
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x000201, 0.075);
                this.sceneGroup = new THREE.Group();
                this.scene.add(this.sceneGroup);

                this.camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
                this.camera.position.z = 9.0;

                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.15;
                this.container.appendChild(this.renderer.domElement);
                this.clock = new THREE.Clock();
            }

            createBackgroundSpace() {
                this.bgUniforms = { uTime: { value: 0 } };
                const bgMaterial = new THREE.ShaderMaterial({
                    vertexShader: bgVertexShader, fragmentShader: bgFragmentShader,
                    uniforms: this.bgUniforms, depthWrite: false
                });
                this.bgScene = new THREE.Scene();
                this.bgCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                this.bgScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMaterial));
            }

            createGeometries() {
                this.geoHomeSilver = new THREE.IcosahedronGeometry(0.5, 64);
                this.geoHomeGreen = new THREE.TorusGeometry(0.42, 0.16, 32, 96);

                this.geoContactSilver = new THREE.OctahedronGeometry(0.52, 0); 
                this.geoContactGreen = new THREE.TorusKnotGeometry(0.33, 0.11, 120, 16, 3, 4); 
            }

            createFloatingSystem() {
                this.uniforms = { uTime: { value: 0 } };

                this.silverMat = new THREE.ShaderMaterial({
                    vertexShader: vertexShader, fragmentShader: fragmentShader,
                    uniforms: { uTime: this.uniforms.uTime, uMaterialType: { value: 0 } }
                });

                this.greenMat = new THREE.ShaderMaterial({
                    vertexShader: vertexShader, fragmentShader: fragmentShader,
                    uniforms: { uTime: this.uniforms.uTime, uMaterialType: { value: 1 } }
                });

                const countPerType = 13;

                for (let i = 0; i < countPerType; i++) {
                    this.addObjectToScene(this.geoHomeSilver, this.silverMat, 'silver');
                }
                for (let i = 0; i < countPerType; i++) {
                    this.addObjectToScene(this.geoHomeGreen, this.greenMat, 'green');
                }
            }

            addObjectToScene(geometry, material, typeId) {
                const mesh = new THREE.Mesh(geometry, material);
                const radius = Math.random() * 4.2 + 1.0;
                const angle = Math.random() * Math.PI * 2;
                
                mesh.position.set(Math.cos(angle) * radius, Math.sin(angle) * radius, (Math.random() - 0.5) * 6.5);
                mesh.userData = {
                    typeId: typeId, 
                    radius: radius, angle: angle,
                    spiralSpeed: (Math.random() * 0.022 + 0.008) * (Math.random() > 0.5 ? 1 : -1),
                    rotSpeedX: Math.random() * 0.3 + 0.1, rotSpeedY: Math.random() * 0.3 + 0.1,
                    seed: Math.random() * 100, baseScale: Math.random() * 0.5 + 0.4
                };

                mesh.scale.setScalar(mesh.userData.baseScale);
                this.sceneGroup.add(mesh);
                this.floatingObjects.push(mesh);
            }

            updateShapesForView(view) {
                this.currentView = view;
                this.floatingObjects.forEach(mesh => {
                    if (view === 'contact') {
                        mesh.geometry = (mesh.userData.typeId === 'silver') ? this.geoContactSilver : this.geoContactGreen;
                    } else {
                        mesh.geometry = (mesh.userData.typeId === 'silver') ? this.geoHomeSilver : this.geoHomeGreen;
                    }
                });
            }

            addEvents() {
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
                window.addEventListener('mousemove', (e) => {
                    this.mouse.targetX = (e.clientX / window.innerWidth) * 2 - 1;
                    this.mouse.targetY = -(e.clientY / window.innerHeight) * 2 + 1;
                });
            }

            animate() {
                requestAnimationFrame(this.animate.bind(this));
                const time = this.clock.getElapsedTime();
                this.uniforms.uTime.value = time;
                this.bgUniforms.uTime.value = time;

                const rotModifier = (this.currentView === 'contact') ? 2.2 : 1.0;
                this.sceneGroup.rotation.y = time * 0.02 * rotModifier;

                this.mouse.x += (this.mouse.targetX - this.mouse.x) * 0.035;
                this.mouse.y += (this.mouse.targetY - this.mouse.y) * 0.035;
                this.camera.position.x = this.mouse.x * 0.7;
                this.camera.position.y = this.mouse.y * 0.7;
                this.camera.lookAt(0, 0, 0);

                this.floatingObjects.forEach(mesh => {
                    const data = mesh.userData;
                    data.angle += data.spiralSpeed * 0.05 * rotModifier; 
                    mesh.position.x = Math.cos(data.angle) * data.radius;
                    mesh.position.y = Math.sin(data.angle) * data.radius;
                    mesh.position.z += Math.sin(time * 0.12 + data.seed) * 0.002;
                    mesh.rotation.x += 0.0012 * data.rotSpeedX * rotModifier;
                    mesh.rotation.y += 0.0018 * data.rotSpeedY * rotModifier;
                    mesh.scale.setScalar(data.baseScale + Math.sin(time * 0.3 + data.seed) * 0.015);
                });

                this.renderer.autoClear = false; this.renderer.clear();
                this.renderer.render(this.bgScene, this.bgCamera);
                this.renderer.render(this.scene, this.camera);
            }
        }

        function initNavigation(webglScene) {
            const btnContact = document.getElementById('contact-view-btn');
            const logo = document.getElementById('brand-logo');
            const secHome = document.getElementById('sec-home');
            const secContact = document.getElementById('sec-contact');
            const footerTag = document.getElementById('footer-tag');

            function showView(view) {
                if (view === 'contact') {
                    secHome.classList.remove('active');
                    setTimeout(() => {
                        secContact.classList.add('active');
                        btnContact.innerText = "Back";
                        footerTag.innerText = "AUTHENTIC METRIC INTERACTION SYSTEM";
                        if(webglScene) webglScene.updateShapesForView('contact');
                    }, 400);
                } else {
                    secContact.classList.remove('active');
                    setTimeout(() => {
                        secHome.classList.add('active');
                        btnContact.innerText = "Contact";
                        footerTag.innerText = "VISUAL ENGAGEMENT FOR HIGH-FIDELITY DISCOVERY";
                        if(webglScene) webglScene.updateShapesForView('home');
                    }, 400);
                }
            }

            btnContact.addEventListener('click', () => {
                const isHome = secHome.classList.contains('active');
                showView(isHome ? 'contact' : 'home');
            });

            logo.addEventListener('click', () => {
                if (!secHome.classList.contains('active')) showView('home');
            });
        }

        function initAudioEngine() {
            const audio = document.getElementById('bg-music');
            const btn = document.getElementById('audio-toggle');
            const btnText = document.getElementById('audio-status-text');
            if (!audio || !btn) return;
            audio.volume = 0.35;

            const startPlaying = () => {
                if (audio.paused) {
                    audio.play().then(() => {
                        btn.classList.add('playing'); if (btnText) btnText.innerText = "Sound On";
                    }).catch(() => {});
                }
            };
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (audio.paused) {
                    audio.play().then(() => {
                        btn.classList.add('playing'); if (btnText) btnText.innerText = "Sound On";
                    });
                } else {
                    audio.pause(); btn.classList.remove('playing'); if (btnText) btnText.innerText = "Sound Off";
                }
            });
            document.body.addEventListener('click', startPlaying, { once: true });
        }

        window.addEventListener('DOMContentLoaded', () => {
            let sceneInstance;
            try {
                sceneInstance = new WebGLScene();
            } catch (e) { console.error(e); }
            initNavigation(sceneInstance);
            initAudioEngine();
        });
    </script>
</body>
</html>
