<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEERY | Official Premium Audio Experience</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: var(--bg-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* WebGL Canvas Container */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* PŮVODNÍ Film Grain Overlay Effect */
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* UI Layout Layers */
        .ui-layer {
            position: relative;
            z-index: 3;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        /* Navigation Header */
        header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }

        .nav-logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        /* Premium Audio Controller Button */
        .audio-control {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .audio-control:hover {
            background: var(--text-main);
            color: var(--bg-color);
            border-color: var(--text-main);
        }

        .audio-waves {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            width: 16px;
            height: 12px;
        }

        .wave-bar {
            width: 2px;
            height: 3px;
            background: currentColor;
            transition: height 0.3s ease;
        }

        .audio-control.playing .wave-bar {
            animation: soundWave 1.2s infinite ease-in-out;
        }
        .audio-control.playing .wave-bar:nth-child(2) { animation-delay: 0.2s; }
        .audio-control.playing .wave-bar:nth-child(3) { animation-delay: 0.4s; }

        /* Hero Main Section */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero-title-container {
            position: relative;
            margin-bottom: 30px;
        }

        .hero-title {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3.5rem, 12vw, 9rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 0.9;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 30%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            user-select: none;
        }

        /* Premium SoundCloud Button */
        .soundcloud-btn {
            pointer-events: auto;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 36px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .soundcloud-btn:hover {
            background: var(--text-main);
            color: var(--bg-color);
            border-color: var(--text-main);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }

        .soundcloud-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            transition: transform 0.4s ease;
        }

        .soundcloud-btn:hover svg {
            transform: scale(1.1);
        }

        /* Footer Info */
        footer {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        /* Scroll Progress Indicator */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .scroll-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--text-muted), transparent);
            position: relative;
            overflow: hidden;
        }

        .scroll-line::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: var(--text-main);
            animation: scrollDrop 2s infinite ease-in-out;
        }

        .scroll-spacer {
            height: 100vh;
            pointer-events: none;
        }

        @keyframes soundWave {
            0% { height: 3px; }
            50% { height: 12px; }
            100% { height: 3px; }
        }

        @keyframes scrollDrop {
            0% { transform: translateY(-100%); }
            80% { transform: translateY(200%); }
            100% { transform: translateY(200%); }
        }

        @media (max-width: 768px) {
            header { padding: 24px; }
            footer { padding: 24px; flex-direction: column; gap: 12px; text-align: center; }
            .scroll-hint { display: none; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="grain-overlay"></div>

    <audio id="bg-music" loop preload="auto">
        <source src="dark.mp3" type="audio/mpeg">
    </audio>

    <div class="ui-layer">
        <header>
            <div class="nav-logo">JEERY</div>
            <button class="audio-control" id="audio-toggle">
                <span id="audio-status-text">Sound Off</span>
                <div class="audio-waves">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>
            </button>
        </header>

        <section class="hero">
            <div class="hero-title-container">
                <h1 class="hero-title">JEERY</h1>
            </div>
            <a href="https://soundcloud.com/jeerycz?utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing" 
               target="_blank" 
               rel="noopener noreferrer" 
               class="soundcloud-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M11.56 16.75c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-6.5c0-.41.34-.75.75-.75s.75.34.75.75v6.5zm-2.5 0c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-4.5c0-.41.34-.75.75-.75s.75.34.75.75v4.5zm-2.5-1c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-2.5c0-.41.34-.75.75-.75s.75.34.75.75v2.5zm-2.5-1c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-.5c0-.41.34-.75.75-.75s.75.34.75.75v.5zm10 2c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-7.5c0-.41.34-.75.75-.75s.75.34.75.75v7.5zm2.5 0c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-8.5c0-.41.34-.75.75-.75s.75.34.75.75v8.5zm2.5-.25c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-8.75c0-.41.34-.75.75-.75s.75.34.75.75v8.75zm2.44-1.42c-.04.38-.37.67-.75.67s-.72-.32-.71-.71c.14-1.85-1.12-3.29-2.98-3.29-.25 0-.5.03-.74.09-.34.09-.69-.13-.77-.47-.36-1.55-1.74-2.62-3.33-2.62-1.39 0-2.65.81-3.18 2.09-.15.36-.55.55-.92.43-.27-.09-.56-.14-.85-.14-1.65 0-3 1.35-3 3 0 .14.01.28.03.42.06.39-.21.75-.6.81-.39.05-.75-.21-.81-.6-.05-.21-.07-.42-.07-.63 0-2.48 2.02-4.5 4.5-4.5.47 0 .93.08 1.37.22.69-.99 1.83-1.6 3.13-1.6 1.82 0 3.39 1.2 3.89 2.92.42-.1.86-.17 1.31-.17 2.76 0 4.79 2.21 4.54 4.99z"/>
                </svg>
                Listen on SoundCloud
            </a>
            <div class="scroll-hint">
                <span>Explore Sound</span>
                <div class="scroll-line"></div>
            </div>
        </section>

        <footer>
            <div>&copy; 2026 JEERY. ALL RIGHTS RESERVED.</div>
            <div>DESIGNED FOR PEAK AUDIO/VISUAL FIDELITY</div>
        </footer>
    </div>

    <div class="scroll-spacer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- WebGL PŮVODNÍ Shaders Setup ---
        const vertexShader = `
            uniform float uTime;
            uniform float uProgress;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            
            vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
            vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
            
            float snoise(vec3 v){
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 =   v - i + dot(i, C.xxx) ;
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                vec3 x3 = x0 - D.yyy;
                i = mod(i, 289.0 );
                vec4 p = permute( permute( permute(
                            i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                        + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                        + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                float n_ = 0.142857142857;
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z *ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
            }

            void main() {
                vUv = uv;
                vec3 pos = position;
                float noiseAmp = 0.25 + (uProgress * 0.15);
                float noiseFreq = 1.2;
                float noise = snoise(vec3(pos.x * noiseFreq, pos.y * noiseFreq + uTime * 0.4, pos.z * noiseFreq));
                pos += normal * noise * noiseAmp;
                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                vViewPosition = -mvPosition.xyz;
                vNormal = normalMatrix * normal;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            uniform vec3 uColor;
            uniform float uTime;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vViewPosition;

            void main() {
                vec3 normal = normalize(vNormal);
                vec3 viewDir = normalize(vViewPosition);
                float fresnel = pow(1.0 - max(dot(normal, viewDir), 0.0), 4.5);
                vec3 lightDir = normalize(vec3(5.0, 5.0, 4.0));
                vec3 halfDir = normalize(lightDir + viewDir);
                float spec = pow(max(dot(normal, halfDir), 0.0), 32.0);
                vec3 baseColor = vec3(0.02, 0.02, 0.03);
                vec3 reflectionColor = vec3(0.85, 0.88, 0.95);
                vec3 finalColor = mix(baseColor, reflectionColor, fresnel * 0.6);
                finalColor += vec3(spec * 0.4);
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        class WebGLApp {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.objectsCount = 14; 
                this.meshArray = [];
                this.scrollProgress = 0;
                this.mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
                
                this.init();
                this.createSceneObjects();
                this.addEventListeners();
                this.initAudioLogic();
                this.animate();
            }

            init() {
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x050505, 0.08);
                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
                this.camera.position.z = 9;

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.2;
                this.container.appendChild(this.renderer.domElement);

                this.clock = new THREE.Clock();

                // OPRAVENO: Vrácení plného filmového osvětlení
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.05);
                this.scene.add(ambientLight);

                this.spotLight = new THREE.SpotLight(0xffffff, 4, 30, Math.PI / 4, 0.5, 1);
                this.spotLight.position.set(5, 10, 8);
                this.scene.add(this.spotLight);

                const rimLight = new THREE.DirectionalLight(0xffffff, 0.8);
                rimLight.position.set(-5, -5, -2);
                this.scene.add(rimLight);
            }

            createSceneObjects() {
                const geometry = new THREE.IcosahedronGeometry(0.7, 32);
                this.shaderUniforms = {
                    uTime: { value: 0 },
                    uProgress: { value: 0 },
                    uColor: { value: new THREE.Color(0x111111) }
                };

                this.material = new THREE.ShaderMaterial({
                    vertexShader: vertexShader,
                    fragmentShader: fragmentShader,
                    uniforms: this.shaderUniforms
                });

                this.spiralGroup = new THREE.Group();

                for (let i = 0; i < this.objectsCount; i++) {
                    const mesh = new THREE.Mesh(geometry, this.material);
                    mesh.userData = {
                        angleOffset: (i / this.objectsCount) * Math.PI * 4,
                        yPositionFactor: (i / this.objectsCount) - 0.5,
                        randomScale: 0.6 + Math.random() * 0.5
                    };
                    this.spiralGroup.add(mesh);
                    this.meshArray.push(mesh);
                }
                this.scene.add(this.spiralGroup);
            }

            initAudioLogic() {
                const audio = document.getElementById('bg-music');
                const btn = document.getElementById('audio-toggle');
                const btnText = document.getElementById('audio-status-text');

                if (!audio || !btn) return;

                audio.volume = 0.5;

                const startAudio = () => {
                    if (audio.paused && !btn.classList.contains('playing')) {
                        audio.play().then(() => {
                            btn.classList.add('playing');
                            btnText.innerText = "Sound On";
                        }).catch(err => console.log("Audio target block:", err));
                    }
                };

                const toggleAudio = (e) => {
                    if (e) e.stopPropagation();
                    if (audio.paused) {
                        audio.play().then(() => {
                            btn.classList.add('playing');
                            btnText.innerText = "Sound On";
                        }).catch(err => console.log(err));
                    } else {
                        audio.pause();
                        btn.classList.remove('playing');
                        btnText.innerText = "Sound Off";
                    }
                };

                btn.addEventListener('click', toggleAudio);
                document.body.addEventListener('click', startAudio, { once: true });
            }

            addEventListeners() {
                window.addEventListener('resize', this.onWindowResize.bind(this));
                window.addEventListener('mousemove', this.onMouseMove.bind(this));
                window.addEventListener('scroll', this.onScroll.bind(this));
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            onMouseMove(event) {
                this.mouse.targetX = (event.clientX / window.innerWidth) * 2 - 1;
                this.mouse.targetY = -(event.clientY / window.innerHeight) * 2 + 1;
            }

            onScroll() {
                const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                if (maxScroll <= 0) return;
                this.scrollProgress = window.scrollY / maxScroll;

                gsap.to(this.shaderUniforms.uProgress, {
                    value: this.scrollProgress,
                    duration: 0.8,
                    ease: "power2.out"
                });
            }

            animate() {
                requestAnimationFrame(this.animate.bind(this));
                const elapsedTime = this.clock.getElapsedTime();
                this.shaderUniforms.uTime.value = elapsedTime;

                // OPRAVENO: Obnovení plynulé fyziky pohybu myši (Lerp) a parallaxu kamery
                this.mouse.x += (this.mouse.targetX - this.mouse.x) * 0.05;
                this.mouse.y += (this.mouse.targetY - this.mouse.y) * 0.05;

                this.camera.position.x = this.mouse.x * 1.5;
                this.camera.position.y = this.mouse.y * 1.5;
                this.camera.lookAt(0, 0, 0);

                const spiralRadius = 3.5 + (this.mouse.x * 0.5);
                const spiralHeight = 12.0;

                // OPRAVENO: Matematicky přesný výpočet šroubovice v čase navázaný na scroll
                this.meshArray.forEach((mesh) => {
                    const data = mesh.userData;
                    const currentAngle = data.angleOffset + (elapsedTime * 0.15) + (this.scrollProgress * Math.PI * 2.5);
                    const baseHeight = data.yPositionFactor * spiralHeight;
                    const currentHeight = baseHeight - (this.scrollProgress * spiralHeight * 0.8);

                    mesh.position.x = Math.cos(currentAngle) * spiralRadius;
                    mesh.position.z = Math.sin(currentAngle) * spiralRadius;
                    mesh.position.y = currentHeight;

                    mesh.rotation.x = elapsedTime * 0.2 + data.angleOffset;
                    mesh.rotation.y = elapsedTime * 0.3;

                    const scaleFactor = data.randomScale * (1.0 - Math.min(Math.abs(mesh.position.z) * 0.05, 0.3));
                    mesh.scale.set(scaleFactor, scaleFactor, scaleFactor);
                });

                this.spiralGroup.rotation.y = -elapsedTime * 0.02;
                this.renderer.render(this.scene, this.camera);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            new WebGLApp();
        });
    </script>
</body>
</html>
