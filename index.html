<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEERY | Official Premium Audio Experience</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Zajišťuje, že stránka nebude nesmyslně scrollovat dolů */
            background-color: var(--bg-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* 3D Plátno fixované přesně na obrazovku */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        /* Filmový šum */
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Uživatelské rozhraní */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        /* Stylové audio tlačítko */
        .audio-control {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .audio-control:hover {
            background: var(--text-main);
            color: var(--bg-color);
        }

        .audio-waves {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            width: 16px;
            height: 12px;
        }

        .wave-bar {
            width: 2px;
            height: 3px;
            background: currentColor;
        }

        .audio-control.playing .wave-bar {
            animation: soundWave 1.2s infinite ease-in-out;
        }
        .audio-control.playing .wave-bar:nth-child(2) { animation-delay: 0.2s; }
        .audio-control.playing .wave-bar:nth-child(3) { animation-delay: 0.4s; }

        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero-title-container {
            margin-bottom: 30px;
        }

        .hero-title {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3.5rem, 12vw, 9rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 0.9;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 30%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            user-select: none;
        }

        .soundcloud-btn {
            pointer-events: auto;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 36px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .soundcloud-btn:hover {
            background: var(--text-main);
            color: var(--bg-color);
            transform: translateY(-2px);
        }

        .soundcloud-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        footer {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        @keyframes soundWave {
            0% { height: 3px; }
            50% { height: 12px; }
            100% { height: 3px; }
        }

        @media (max-width: 768px) {
            header { padding: 24px; }
            footer { padding: 24px; flex-direction: column; gap: 12px; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="grain-overlay"></div>

    <audio id="bg-music" loop preload="auto">
        <source src="dark.mp3" type="audio/mpeg">
    </audio>

    <div class="ui-layer">
        <header>
            <div class="nav-logo">JEERY</div>
            <button class="audio-control" id="audio-toggle">
                <span id="audio-status-text">Sound Off</span>
                <div class="audio-waves">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>
            </button>
        </header>

        <section class="hero">
            <div class="hero-title-container">
                <h1 class="hero-title">JEERY</h1>
            </div>
            <a href="https://soundcloud.com/jeerycz?utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing" 
               target="_blank" 
               rel="noopener noreferrer" 
               class="soundcloud-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M11.56 16.75c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-6.5c0-.41.34-.75.75-.75s.75.34.75.75v6.5zm-2.5 0c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-4.5c0-.41.34-.75.75-.75s.75.34.75.75v4.5zm-2.5-1c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-2.5c0-.41.34-.75.75-.75s.75.34.75.75v2.5zm-2.5-1c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-.5c0-.41.34-.75.75-.75s.75.34.75.75v.5zm10 2c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-7.5c0-.41.34-.75.75-.75s.75.34.75.75v7.5zm2.5 0c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-8.5c0-.41.34-.75.75-.75s.75.34.75.75v8.5zm2.5-.25c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-8.75c0-.41.34-.75.75-.75s.75.34.75.75v8.75zm2.44-1.42c-.04.38-.37.67-.75.67s-.72-.32-.71-.71c.14-1.85-1.12-3.29-2.98-3.29-.25 0-.5.03-.74.09-.34.09-.69-.13-.77-.47-.36-1.55-1.74-2.62-3.33-2.62-1.39 0-2.65.81-3.18 2.09-.15.36-.55.55-.92.43-.27-.09-.56-.14-.85-.14-1.65 0-3 1.35-3 3 0 .14.01.28.03.42.06.39-.21.75-.6.81-.39.05-.75-.21-.81-.6-.05-.21-.07-.42-.07-.63 0-2.48 2.02-4.5 4.5-4.5.47 0 .93.08 1.37.22.69-.99 1.83-1.6 3.13-1.6 1.82 0 3.39 1.2 3.89 2.92.42-.1.86-.17 1.31-.17 2.76 0 4.79 2.21 4.54 4.99z"/>
                </svg>
                Listen on SoundCloud
            </a>
        </section>

        <footer>
            <div>&copy; 2026 JEERY. ALL RIGHTS RESERVED.</div>
            <div>DESIGNED FOR PEAK AUDIO/VISUAL FIDELITY</div>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- PŮVODNÍ MATEMATICKÉ SHADERY PRO DEFORMACI (Vždy bezpečné) ---
        const vertexShader = `
            uniform float uTime;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            
            vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
            vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
            
            float snoise(vec3 v){
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 =   v - i + dot(i, C.xxx) ;
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                vec3 x3 = x0 - D.yyy;
                i = mod(i, 289.0 );
                vec4 p = permute( permute( permute(
                            i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                        + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                        + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                float n_ = 0.142857142857;
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z *ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
            }

            void main() {
                vUv = uv;
                vec3 pos = position;
                // Matematická deformace původního objektu v čase
                float noiseAmp = 0.35;
                float noiseFreq = 0.8;
                float noise = snoise(vec3(pos.x * noiseFreq, pos.y * noiseFreq + uTime * 0.3, pos.z * noiseFreq));
                pos += normal * noise * noiseAmp;
                
                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                vViewPosition = -mvPosition.xyz;
                vNormal = normalMatrix * normal;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vViewPosition;

            void main() {
                vec3 normal = normalize(vNormal);
                vec3 viewDir = normalize(vViewPosition);
                
                // Původní prémiový Fresnelův efekt (temný podklad s kovovým odleskem na hranách)
                float fresnel = pow(1.0 - max(dot(normal, viewDir), 0.0), 4.0);
                
                vec3 lightDir = normalize(vec3(5.0, 5.0, 4.0));
                vec3 halfDir = normalize(lightDir + viewDir);
                float spec = pow(max(dot(normal, halfDir), 0.0), 16.0);
                
                vec3 baseColor = vec3(0.01, 0.01, 0.02);
                vec3 reflectionColor = vec3(0.85, 0.88, 0.95);
                
                vec3 finalColor = mix(baseColor, reflectionColor, fresnel * 0.55);
                finalColor += vec3(spec * 0.3);
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        // --- Inicializace 3D scény ---
        class WebGLScene {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
                
                this.init();
                this.createOrganicObject();
                this.addEvents();
                this.animate();
            }

            init() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x050505);

                this.camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
                this.camera.position.z = 4.5; // Ideální vzdálenost od tekutého objektu

                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.container.appendChild(this.renderer.domElement);

                this.clock = new THREE.Clock();
            }

            createOrganicObject() {
                // Původní detailní sféra připravená na deformaci shaderem
                const geometry = new THREE.IcosahedronGeometry(1.5, 64);

                this.uniforms = {
                    uTime: { value: 0 }
                };

                const material = new THREE.ShaderMaterial({
                    vertexShader: vertexShader,
                    fragmentShader: fragmentShader,
                    uniforms: this.uniforms
                });

                this.organicMesh = new THREE.Mesh(geometry, material);
                this.scene.add(this.organicMesh);
            }

            addEvents() {
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });

                window.addEventListener('mousemove', (e) => {
                    this.mouse.targetX = (e.clientX / window.innerWidth) * 2 - 1;
                    this.mouse.targetY = -(e.clientY / window.innerHeight) * 2 + 1;
                });
            }

            animate() {
                requestAnimationFrame(this.animate.bind(this));
                
                const time = this.clock.getElapsedTime();
                this.uniforms.uTime.value = time;

                // Plynulé otáčení a jemná reakce pozice na myš (původní chování)
                this.mouse.x += (this.mouse.targetX - this.mouse.x) * 0.05;
                this.mouse.y += (this.mouse.targetY - this.mouse.y) * 0.05;

                if (this.organicMesh) {
                    this.organicMesh.rotation.y = time * 0.15;
                    this.organicMesh.rotation.x = time * 0.1;
                    
                    // Jemný posun celého objektu podle pohybu kurzoru
                    this.organicMesh.position.x = this.mouse.x * 0.4;
                    this.organicMesh.position.y = this.mouse.y * 0.4;
                }

                this.renderer.render(this.scene, this.camera);
            }
        }

        // --- Samostatný audio engine oddělený od 3D kódu ---
        function initAudioEngine() {
            const audio = document.getElementById('bg-music');
            const btn = document.getElementById('audio-toggle');
            const btnText = document.getElementById('audio-status-text');

            if (!audio || !btn) return;
            audio.volume = 0.4;

            const startPlaying = () => {
                if (audio.paused) {
                    audio.play().then(() => {
                        btn.classList.add('playing');
                        if (btnText) btnText.innerText = "Sound On";
                    }).catch(() => console.log("Autoplay block protection bypass"));
                }
            };

            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (audio.paused) {
                    audio.play().then(() => {
                        btn.classList.add('playing');
                        if (btnText) btnText.innerText = "Sound On";
                    }).catch(err => console.error(err));
                } else {
                    audio.pause();
                    btn.classList.remove('playing');
                    if (btnText) btnText.innerText = "Sound Off";
                }
            });

            document.body.addEventListener('click', startPlaying, { once: true });
        }

        // Nezávislé spuštění obou komponent
        window.addEventListener('DOMContentLoaded', () => {
            try {
                new WebGLScene();
            } catch (e) {
                console.error("Chyba inicializace grafiky:", e);
            }
            initAudioEngine();
        });
    </script>
</body>
</html>
