<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEERY | Official Premium Audio Experience</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Fix proti scrollování stránky dolů */
            background-color: var(--bg-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* 3D Plátno fixované přesně na obrazovku */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        /* Filmový šum v pozadí */
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Uživatelské rozhraní */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        /* Stylové audio tlačítko */
        .audio-control {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .audio-control:hover {
            background: var(--text-main);
            color: var(--bg-color);
        }

        .audio-waves {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            width: 16px;
            height: 12px;
        }

        .wave-bar {
            width: 2px;
            height: 3px;
            background: currentColor;
        }

        .audio-control.playing .wave-bar {
            animation: soundWave 1.2s infinite ease-in-out;
        }
        .audio-control.playing .wave-bar:nth-child(2) { animation-delay: 0.2s; }
        .audio-control.playing .wave-bar:nth-child(3) { animation-delay: 0.4s; }

        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero-title-container {
            margin-bottom: 30px;
        }

        .hero-title {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3.5rem, 12vw, 9rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 0.9;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 30%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            user-select: none;
        }

        .soundcloud-btn {
            pointer-events: auto;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 36px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .soundcloud-btn:hover {
            background: var(--text-main);
            color: var(--bg-color);
            transform: translateY(-2px);
        }

        .soundcloud-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        footer {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        @keyframes soundWave {
            0% { height: 3px; }
            50% { height: 12px; }
            100% { height: 3px; }
        }

        @media (max-width: 768px) {
            header { padding: 24px; }
            footer { padding: 24px; flex-direction: column; gap: 12px; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="grain-overlay"></div>

    <audio id="bg-music" loop preload="auto">
        <source src="dark.mp3" type="audio/mpeg">
    </audio>

    <div class="ui-layer">
        <header>
            <div class="nav-logo">JEERY</div>
            <button class="audio-control" id="audio-toggle">
                <span id="audio-status-text">Sound Off</span>
                <div class="audio-waves">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>
            </button>
        </header>

        <section class="hero">
            <div class="hero-title-container">
                <h1 class="hero-title">JEERY</h1>
            </div>
            <a href="https://soundcloud.com/jeerycz?utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing" 
               target="_blank" 
               rel="noopener noreferrer" 
               class="soundcloud-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M11.56 16.75c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-6.5c0-.41.34-.75.75-.75s.75.34.75.75v6.5zm-2.5 0c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-4.5c0-.41.34-.75.75-.75s.75.34.75.75v4.5zm-2.5-1c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-2.5c0-.41.34-.75.75-.75s.75.34.75.75v2.5zm-2.5-1c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-.5c0-.41.34-.75.75-.75s.75.34.75.75v.5zm10 2c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-7.5c0-.41.34-.75.75-.75s.75.34.75.75v7.5zm2.5 0c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-8.5c0-.41.34-.75.75-.75s.75.34.75.75v8.5zm2.5-.25c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-8.75c0-.41.34-.75.75-.75s.75.34.75.75v8.75zm2.44-1.42c-.04.38-.37.67-.75.67s-.72-.32-.71-.71c.14-1.85-1.12-3.29-2.98-3.29-.25 0-.5.03-.74.09-.34.09-.69-.13-.77-.47-.36-1.55-1.74-2.62-3.33-2.62-1.39 0-2.65.81-3.18 2.09-.15.36-.55.55-.92.43-.27-.09-.56-.14-.85-.14-1.65 0-3 1.35-3 3 0 .14.01.28.03.42.06.39-.21.75-.6.81-.39.05-.75-.21-.81-.6-.05-.21-.07-.42-.07-.63 0-2.48 2.02-4.5 4.5-4.5.47 0 .93.08 1.37.22.69-.99 1.83-1.6 3.13-1.6 1.82 0 3.39 1.2 3.89 2.92.42-.1.86-.17 1.31-.17 2.76 0 4.79 2.21 4.54 4.99z"/>
                </svg>
                Listen on SoundCloud
            </a>
        </section>

        <footer>
            <div>&copy; 2026 JEERY. ALL RIGHTS RESERVED.</div>
            <div>DESIGNED FOR PEAK AUDIO/VISUAL FIDELITY</div>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        class WebGLScene {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.floatingObjects = [];
                this.mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
                
                this.init();
                this.addLights(); // Přidání fyzických světel pro kovové odlesky
                this.createFloatingSystem();
                this.addEvents();
                this.animate();
            }

            init() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x050505);
                this.scene.fog = new THREE.FogExp2(0x050505, 0.12);

                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
                this.camera.position.z = 8;

                // Použijeme WebGLRenderer s podporou fyzikálního mapování světel
                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping; // Filmové podání světla
                this.renderer.toneMappingExposure = 1.2;
                this.container.appendChild(this.renderer.domElement);

                this.clock = new THREE.Clock();
            }

            addLights() {
                // Tlumené okolní světlo
                const ambientLight = new THREE.AmbientLight(0x111118);
                this.scene.add(ambientLight);

                // Hlavní silné bílé světlo pro ostré odlesky hran
                this.dirLight1 = new THREE.DirectionalLight(0xffffff, 2.5);
                this.dirLight1.position.set(5, 5, 4);
                this.scene.add(this.dirLight1);

                // Sekundární plnící studené světlo z opačné strany
                this.dirLight2 = new THREE.DirectionalLight(0x7788ff, 1.5);
                this.dirLight2.position.set(-5, -3, 2);
                this.scene.add(this.dirLight2);

                // Jemné podsvícení zezadu (Rim light)
                const backLight = new THREE.DirectionalLight(0xffffff, 1.0);
                backLight.position.set(0, 0, -5);
                this.scene.add(backLight);
            }

            createFloatingSystem() {
                // Použijeme detailní Icosahedron pro nepravidelný organický tvar kapiček
                const geometry = new THREE.IcosahedronGeometry(0.5, 3);
                
                // Ruční drobná deformace vrcholů geometrie, aby byl každý kus originální organická kapička
                const positionAttribute = geometry.attributes.position;
                for (let i = 0; i < positionAttribute.count; i++) {
                    const x = positionAttribute.getX(i);
                    const y = positionAttribute.getY(i);
                    const z = positionAttribute.getZ(i);
                    
                    // Přidání nepravidelnosti na povrch
                    const noise = (Math.sin(x * 4) + Math.cos(y * 4) + Math.sin(z * 4)) * 0.08;
                    positionAttribute.setXYZ(i, x + x * noise, y + y * noise, z + z * noise);
                }
                geometry.computeVertexNormals();

                // Fyzikální materiál s luxusním kovovým a zrcadlovým odleskem (PBR)
                const premiumMaterial = new THREE.MeshPhysicalMaterial({
                    color: 0x111115,         // Temně grafitový základ
                    metalness: 0.95,         // Téměř čistý kov
                    roughness: 0.05,         // Maximálně vyhlazený povrch pro zrcadlový odraz
                    clearcoat: 1.0,          // Dodatečná průhledná vrstva laku
                    clearcoatRoughness: 0.02,
                    reflectivity: 1.0
                });

                const objectCount = 18;
                for (let i = 0; i < objectCount; i++) {
                    const mesh = new THREE.Mesh(geometry, premiumMaterial);
                    
                    // Výchozí nastavení pozice ve spirálové struktuře
                    const radius = Math.random() * 3.5 + 1.5; // Vzdálenost od středu spirály
                    const angle = Math.random() * Math.PI * 2; // Počiatoční úhel
                    const zPos = (Math.random() - 0.5) * 8;   // Rozprostření hloubky
                    
                    mesh.position.set(
                        Math.cos(angle) * radius,
                        Math.sin(angle) * radius,
                        zPos
                    );

                    // Uložení parametrů pro pohyb do spirály do userData
                    mesh.userData = {
                        radius: radius,
                        angle: angle,
                        spiralSpeed: (Math.random() * 0.05 + 0.02) * (Math.random() > 0.5 ? 1 : -1), // Rychlost oběhu
                        zSpeed: (Math.random() - 0.5) * 0.3, // Rychlost stoupání/klesání v ose Z
                        rotSpeedX: Math.random() * 0.4 + 0.1,
                        rotSpeedY: Math.random() * 0.4 + 0.2,
                        seed: Math.random() * 100,
                        baseScale: Math.random() * 0.5 + 0.5
                    };

                    mesh.scale.setScalar(mesh.userData.baseScale);
                    this.scene.add(mesh);
                    this.floatingObjects.push(mesh);
                }
            }

            addEvents() {
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });

                window.addEventListener('mousemove', (e) => {
                    this.mouse.targetX = (e.clientX / window.innerWidth) * 2 - 1;
                    this.mouse.targetY = -(e.clientY / window.innerHeight) * 2 + 1;
                });
            }

            animate() {
                requestAnimationFrame(this.animate.bind(this));
                
                const time = this.clock.getElapsedTime();

                // Jemná reakce kamery na pohyb myši (Parallax)
                this.mouse.x += (this.mouse.targetX - this.mouse.x) * 0.05;
                this.mouse.y += (this.mouse.targetY - this.mouse.y) * 0.05;
                
                this.camera.position.x = this.mouse.x * 1.2;
                this.camera.position.y = this.mouse.y * 1.2;
                this.camera.lookAt(0, 0, 0);

                // Pohyb světel s myší pro dynamické přelévání odlesků na objektech
                if (this.dirLight1) {
                    this.dirLight1.position.x = 5 + this.mouse.x * 3;
                    this.dirLight1.position.y = 5 + this.mouse.y * 3;
                }

                // Logika plynulého spirálovitého pohybu v prostoru
                this.floatingObjects.forEach(mesh => {
                    const data = mesh.userData;
                    
                    // 1. Aktualizace úhlu pro rotaci kolem středu
                    data.angle += data.spiralSpeed * 0.1; 
                    
                    // 2. Výpočet nové X a Y pozice na základě měnícího se úhlu (kruh/spirála)
                    mesh.position.x = Math.cos(data.angle) * data.radius;
                    mesh.position.y = Math.sin(data.angle) * data.radius;
                    
                    // 3. Plynulý posun vpřed a vzad v prostoru (osa Z) pomocí sinusové vlny
                    mesh.position.z += Math.sin(time * 0.2 + data.seed) * 0.004;

                    // Vlastní pomalé otáčení samotného předmětu
                    mesh.rotation.x += 0.003 * data.rotSpeedX;
                    mesh.rotation.y += 0.004 * data.rotSpeedY;
                    
                    // Jemné pulzování měřítka v čase (organický efekt dýchání)
                    const scalePulse = data.baseScale + Math.sin(time * 0.5 + data.seed) * 0.03;
                    mesh.scale.setScalar(scalePulse);
                });

                this.renderer.render(this.scene, this.camera);
            }
        }

        // --- Bezpečná správa audia ---
        function initAudioEngine() {
            const audio = document.getElementById('bg-music');
            const btn = document.getElementById('audio-toggle');
            const btnText = document.getElementById('audio-status-text');

            if (!audio || !btn) return;
            audio.volume = 0.4;

            const startPlaying = () => {
                if (audio.paused) {
                    audio.play().then(() => {
                        btn.classList.add('playing');
                        if (btnText) btnText.innerText = "Sound On";
                    }).catch(() => console.log("Autoplay block pass"));
                }
            };

            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (audio.paused) {
                    audio.play().then(() => {
                        btn.classList.add('playing');
                        if (btnText) btnText.innerText = "Sound On";
                    }).catch(err => console.error(err));
                } else {
                    audio.pause();
                    btn.classList.remove('playing');
                    if (btnText) btnText.innerText = "Sound Off";
                }
            });

            document.body.addEventListener('click', startPlaying, { once: true });
        }

        window.addEventListener('DOMContentLoaded', () => {
            try {
                new WebGLScene();
            } catch (e) {
                console.error("3D subsystém selhal:", e);
            }
            initAudioEngine();
        });
    </script>
</body>
</html>
