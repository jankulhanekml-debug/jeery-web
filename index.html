<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEERY | Official Premium Audio Experience</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        .audio-control {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .audio-control:hover {
            background: var(--text-main);
            color: var(--bg-color);
        }

        .audio-waves {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            width: 16px;
            height: 12px;
        }

        .wave-bar {
            width: 2px;
            height: 3px;
            background: currentColor;
        }

        .audio-control.playing .wave-bar {
            animation: soundWave 1.2s infinite ease-in-out;
        }
        .audio-control.playing .wave-bar:nth-child(2) { animation-delay: 0.2s; }
        .audio-control.playing .wave-bar:nth-child(3) { animation-delay: 0.4s; }

        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero-title-container {
            margin-bottom: 30px;
        }

        .hero-title {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3.5rem, 12vw, 9rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 0.9;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 30%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            user-select: none;
        }

        .soundcloud-btn {
            pointer-events: auto;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 36px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .soundcloud-btn:hover {
            background: var(--text-main);
            color: var(--bg-color);
            transform: translateY(-2px);
        }

        .soundcloud-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        footer {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        @keyframes soundWave {
            0% { height: 3px; }
            50% { height: 12px; }
            100% { height: 3px; }
        }

        @media (max-width: 768px) {
            header { padding: 24px; }
            footer { padding: 24px; flex-direction: column; gap: 12px; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="grain-overlay"></div>

    <audio id="bg-music" loop preload="auto">
        <source src="dark.mp3" type="audio/mpeg">
    </audio>

    <div class="ui-layer">
        <header>
            <div class="nav-logo">JEERY</div>
            <button class="audio-control" id="audio-toggle">
                <span id="audio-status-text">Sound Off</span>
                <div class="audio-waves">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>
            </button>
        </header>

        <section class="hero">
            <div class="hero-title-container">
                <h1 class="hero-title">JEERY</h1>
            </div>
            <a href="https://soundcloud.com/jeerycz?utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing" 
               target="_blank" 
               rel="noopener noreferrer" 
               class="soundcloud-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M11.56 16.75c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-6.5c0-.41.34-.75.75-.75s.75.34.75.75v6.5zm-2.5 0c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-4.5c0-.41.34-.75.75-.75s.75.34.75.75v4.5zm-2.5-1c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-2.5c0-.41.34-.75.75-.75s.75.34.75.75v2.5zm-2.5-1c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-.5c0-.41.34-.75.75-.75s.75.34.75.75v.5zm10 2c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-7.5c0-.41.34-.75.75-.75s.75.34.75.75v7.5zm2.5 0c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-8.5c0-.41.34-.75.75-.75s.75.34.75.75v8.5zm2.5-.25c0 .41-.34.75-.75.75s-.75-.34-.75-.75v-8.75c0-.41.34-.75.75-.75s.75.34.75.75v8.75zm2.44-1.42c-.04.38-.37.67-.75.67s-.72-.32-.71-.71c.14-1.85-1.12-3.29-2.98-3.29-.25 0-.5.03-.74.09-.34.09-.69-.13-.77-.47-.36-1.55-1.74-2.62-3.33-2.62-1.39 0-2.65.81-3.18 2.09-.15.36-.55.55-.92.43-.27-.09-.56-.14-.85-.14-1.65 0-3 1.35-3 3 0 .14.01.28.03.42.06.39-.21.75-.6.81-.39.05-.75-.21-.81-.6-.05-.21-.07-.42-.07-.63 0-2.48 2.02-4.5 4.5-4.5.47 0 .93.08 1.37.22.69-.99 1.83-1.6 3.13-1.6 1.82 0 3.39 1.2 3.89 2.92.42-.1.86-.17 1.31-.17 2.76 0 4.79 2.21 4.54 4.99z"/>
                </svg>
                Listen on SoundCloud
            </a>
        </section>

        <footer>
            <div>&copy; 2026 JEERY. ALL RIGHTS RESERVED.</div>
            <div>DESIGNED FOR PEAK AUDIO/VISUAL FIDELITY</div>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- SHADER PRO ATMOSFÉRICKÉ POZADÍ (Světlo vyvěrající z hlubin) ---
        const bgVertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const bgFragmentShader = `
            varying vec2 vUv;
            uniform float uTime;

            void main() {
                // Převod na středové souřadnice (-1 až 1)
                vec2 uv = vUv * 2.0 - 1.0;
                
                // Výpočet vzdálenosti od středu pro radiální záři
                float dist = length(uv);
                
                // Dynamická jemná pulzace hlubokého světla
                float pulse = sin(uTime * 0.4) * 0.04 + 0.96;
                
                // Definice barev hlubokého prostoru (Temně šedá pro hloubku, lehký nádech klubové zeleně a modři)
                vec3 spaceCore = vec3(0.04, 0.08, 0.06) * pulse; // Středové vyvěrající světlo z hlubin
                vec3 spaceVoid = vec3(0.01, 0.01, 0.012);        // Temný nekonečný okraj vesmíru
                
                // Vytvoření jemného, hlubokého ambientního gradientu
                float glow = smoothstep(1.8, 0.0, dist);
                vec3 finalBg = mix(spaceVoid, spaceCore, glow);
                
                gl_FragColor = vec4(finalBg, 1.0);
            }
        `;

        // --- ORGANICKÝ VERTEX SHADER PRO GEOMETRII ---
        const vertexShader = `
            uniform float uTime;
            varying vec3 vNormal;
            varying vec3 vViewPosition;

            void main() {
                vec3 pos = position;
                
                float wave = sin(pos.x * 3.0 + uTime * 1.0) * cos(pos.y * 3.0 + uTime * 1.0) * sin(pos.z * 3.0 + uTime * 1.0);
                pos += normal * wave * 0.20;
                
                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                vViewPosition = -mvPosition.xyz;
                vNormal = normalMatrix * normal;
                
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        // --- FRAGMENT SHADER PRO GEOMETRII OBJEKTŮ ---
        const fragmentShader = `
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            uniform int uMaterialType; // 0 = Stříbřitý, 1 = Temně zelený

            void main() {
                vec3 normal = normalize(vNormal);
                vec3 viewDir = normalize(vViewPosition);
                
                // Hluboký temný podklad objektů
                vec3 baseBlack = vec3(0.005, 0.005, 0.007); 
                
                vec3 lightDir1 = normalize(vec3(5.0, 8.0, 4.0));
                vec3 lightDir2 = normalize(vec3(-5.0, -4.0, 3.0));
                
                vec3 reflectColor = vec3(1.0, 1.0, 1.0);
                if(uMaterialType == 1) {
                    reflectColor = vec3(0.0, 0.5, 0.15); // Designová zelená
                }
                
                // Ostré ohraničení hran (Fresnel)
                float fresnel = pow(1.0 - max(dot(normal, viewDir), 0.0), 7.0);
                vec3 edgeReflection = reflectColor * fresnel * 0.95;
                
                // Specular odlesky
                vec3 halfDir1 = normalize(lightDir1 + viewDir);
                float spec1 = pow(max(dot(normal, halfDir1), 0.0), 64.0); 
                
                vec3 halfDir2 = normalize(lightDir2 + viewDir);
                float spec2 = pow(max(dot(normal, halfDir2), 0.0), 48.0);
                
                vec3 finalColor = baseBlack;
                finalColor += edgeReflection;
                finalColor += reflectColor * (spec1 * 0.9);
                finalColor += reflectColor * (spec2 * 0.35);
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        class WebGLScene {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.floatingObjects = [];
                this.mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
                
                this.init();
                this.createBackgroundSpace(); // Inicializace hlubokého prostoru pozadí
                this.createFloatingSystem();
                this.addEvents();
                this.animate();
            }

            init() {
                this.scene = new THREE.Scene();
                
                // Jemná mlha přizpůsobená vyvěrajícímu světlu pozadí
                this.scene.fog = new THREE.FogExp2(0x010403, 0.08);

                this.sceneGroup = new THREE.Group();
                this.scene.add(this.sceneGroup);

                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
                this.camera.position.z = 8.5;

                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.2;
                this.container.appendChild(this.renderer.domElement);

                this.clock = new THREE.Clock();
            }

            createBackgroundSpace() {
                // Vytvoření plošného shaderu, který se vykresluje přímo za všemi objekty v nekonečnu
                this.bgUniforms = {
                    uTime: { value: 0 }
                };

                const bgMaterial = new THREE.ShaderMaterial({
                    vertexShader: bgVertexShader,
                    fragmentShader: bgFragmentShader,
                    uniforms: this.bgUniforms,
                    depthWrite: false // Pozadí se neplete do výpočtu hloubky 3D prvků
                });

                const bgQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMaterial);
                
                // Vytvoření dedikované scény pro pozadí, která se vykreslí jako první
                this.bgScene = new THREE.Scene();
                this.bgCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                this.bgScene.add(bgQuad);
            }

            createFloatingSystem() {
                const sphereGeo = new THREE.IcosahedronGeometry(0.5, 24);
                const torusGeo = new THREE.TorusGeometry(0.4, 0.18, 16, 48);

                this.uniforms = { uTime: { value: 0 } };

                const silverMat = new THREE.ShaderMaterial({
                    vertexShader: vertexShader,
                    fragmentShader: fragmentShader,
                    uniforms: { uTime: this.uniforms.uTime, uMaterialType: { value: 0 } }
                });

                const greenMat = new THREE.ShaderMaterial({
                    vertexShader: vertexShader,
                    fragmentShader: fragmentShader,
                    uniforms: { uTime: this.uniforms.uTime, uMaterialType: { value: 1 } }
                });

                const countPerType = 14;

                for (let i = 0; i < countPerType; i++) {
                    this.addObjectToScene(sphereGeo, silverMat);
                }

                for (let i = 0; i < countPerType; i++) {
                    this.addObjectToScene(torusGeo, greenMat);
                }
            }

            addObjectToScene(geometry, material) {
                const mesh = new THREE.Mesh(geometry, material);
                
                const radius = Math.random() * 4.0 + 1.2;
                const angle = Math.random() * Math.PI * 2;
                const zPos = (Math.random() - 0.5) * 6;
                
                mesh.position.set(
                    Math.cos(angle) * radius,
                    Math.sin(angle) * radius,
                    zPos
                );

                mesh.userData = {
                    radius: radius,
                    angle: angle,
                    spiralSpeed: (Math.random() * 0.04 + 0.01) * (Math.random() > 0.5 ? 1 : -1),
                    rotSpeedX: Math.random() * 0.5 + 0.2,
                    rotSpeedY: Math.random() * 0.5 + 0.2,
                    seed: Math.random() * 100,
                    baseScale: Math.random() * 0.5 + 0.45
                };

                mesh.scale.setScalar(mesh.userData.baseScale);
                
                this.sceneGroup.add(mesh);
                this.floatingObjects.push(mesh);
            }

            addEvents() {
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });

                window.addEventListener('mousemove', (e) => {
                    this.mouse.targetX = (e.clientX / window.innerWidth) * 2 - 1;
                    this.mouse.targetY = -(e.clientY / window.innerHeight) * 2 + 1;
                });
            }

            animate() {
                requestAnimationFrame(this.animate.bind(this));
                
                const time = this.clock.getElapsedTime();
                this.uniforms.uTime.value = time;
                this.bgUniforms.uTime.value = time; // Posílání času do shaderu pozadí

                this.sceneGroup.rotation.y = time * 0.035;

                this.mouse.x += (this.mouse.targetX - this.mouse.x) * 0.05;
                this.mouse.y += (this.mouse.targetY - this.mouse.y) * 0.05;
                
                this.camera.position.x = this.mouse.x * 0.9;
                this.camera.position.y = this.mouse.y * 0.9;
                this.camera.lookAt(0, 0, 0);

                this.floatingObjects.forEach(mesh => {
                    const data = mesh.userData;
                    
                    data.angle += data.spiralSpeed * 0.08; 
                    mesh.position.x = Math.cos(data.angle) * data.radius;
                    mesh.position.y = Math.sin(data.angle) * data.radius;
                    
                    mesh.position.z += Math.sin(time * 0.15 + data.seed) * 0.003;

                    mesh.rotation.x += 0.002 * data.rotSpeedX;
                    mesh.rotation.y += 0.003 * data.rotSpeedY;
                    
                    const scalePulse = data.baseScale + Math.sin(time * 0.4 + data.seed) * 0.025;
                    mesh.scale.setScalar(scalePulse);
                });

                // Dvojitý render pas pro dokonalé vrstvení
                this.renderer.autoClear = false;
                this.renderer.clear();
                
                this.renderer.render(this.bgScene, this.bgCamera); // 1. Vykreslení hlubokého pozadí
                this.renderer.render(this.scene, this.camera);     // 2. Vykreslení 3D objektů na pozadí
            }
        }

        function initAudioEngine() {
            const audio = document.getElementById('bg-music');
            const btn = document.getElementById('audio-toggle');
            const btnText = document.getElementById('audio-status-text');

            if (!audio || !btn) return;
            audio.volume = 0.4;

            const startPlaying = () => {
                if (audio.paused) {
                    audio.play().then(() => {
                        btn.classList.add('playing');
                        if (btnText) btnText.innerText = "Sound On";
                    }).catch(() => console.log("Autoplay block pass"));
                }
            };

            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (audio.paused) {
                    audio.play().then(() => {
                        btn.classList.add('playing');
                        if (btnText) btnText.innerText = "Sound On";
                    }).catch(err => console.error(err));
                } else {
                    audio.pause();
                    btn.classList.remove('playing');
                    if (btnText) btnText.innerText = "Sound Off";
                }
            });

            document.body.addEventListener('click', startPlaying, { once: true });
        }

        window.addEventListener('DOMContentLoaded', () => {
            try {
                new WebGLScene();
            } catch (e) {
                console.error("3D subsystém selhal:", e);
            }
            initAudioEngine();
        });
    </script>
</body>
</html>
